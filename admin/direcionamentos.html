<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentoria — Direcionamentos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/admin.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="loading-screen" id="loadingScreen"><div class="loading-logo">M</div><div class="loading-spinner"></div></div>
<div id="appShell" style="display:none;">
<div class="topbar">
  <div class="brand"><div class="seal">M</div><div class="brand-text"><div class="t1">Mentoria</div><div class="t2">Painel do mentor</div></div></div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span style="font-size:13px;color:var(--text-soft);" id="userEmailLabel">—</span>
    <button class="btn ghost small" onclick="logout()">Sair</button>
  </div>
</div>
<div class="shell">
  <nav class="nav">
    <div class="nav-group-label">Gestão</div>
    <a href="/admin/alunos.html"><span class="dot"></span>Alunos</a>
    <a href="/admin/direcionamentos.html" class="active"><span class="dot"></span>Direcionamentos</a>
    <a href="/admin/edital.html"><span class="dot"></span>Edital</a>
  </nav>
  <main>
    <h1 class="page-title">Direcionamentos dos alunos</h1>
    <p class="page-sub">Clique em um aluno para ver e adicionar direcionamentos</p>
    <svg width="0" height="0" style="position:absolute;"><defs><linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0B6E4F"/><stop offset="100%" stop-color="#15B981"/></linearGradient></defs></svg>
    <div id="mDirecAlunoList"></div>
    <div id="mDirecDetalhe" style="display:none;margin-top:30px;">
      <div class="section-head">
        <h2 id="mDirecNomeAluno">—</h2>
        <div style="display:flex;gap:10px;">
          <button class="btn" id="mDirecNovoBtn">Adicionar direcionamento</button>
          <button class="btn ghost small" id="mDirecFecharBtn">Fechar</button>
        </div>
      </div>
      <div id="mDirecList"></div>
    </div>
    <div class="modal-overlay" id="novoDirecModalOverlay" style="display:none;">
      <div class="modal">
        <h3 class="display">Novo direcionamento</h3>
        <p>Defina o número e a carreira foco desta semana.</p>
        <label>Número</label><input type="text" id="novoDirecNumero" placeholder="03">
        <label>Carreira / concurso foco</label><input type="text" id="novoDirecCarreira" placeholder="Autoridade e Controle">
        <div class="modal-actions">
          <button class="btn ghost" id="novoDirecCancelar">Cancelar</button>
          <button class="btn" id="novoDirecConfirmar">Criar direcionamento</button>
        </div>
      </div>
    </div>
  </main>
</div>
</div>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/admin/direcionamentos.js"></script>
</body>
</html>
